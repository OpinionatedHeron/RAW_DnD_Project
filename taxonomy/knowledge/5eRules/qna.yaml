      Draconic Ancestry
      | Dragon  | Damage Type   | Breath Weapon    |
      | ----- | ------------ | ------------------- |
      | Black | Acid | 5 by 30 ft. line (Dex. save) |
      | Blue | Lightning | 5 by 30 ft. line (Dex. save) |
      | Brass | Fire | 5 by 30 ft. line (Dex. save) |
      | Bronze | Lightning | 5 by 30 ft. line (Dex. save) |
      | Copper | Acid | 5 by 30 ft. line (Dex. save) |
      | Gold | Fire | 15 ft. cone (Dex. save) |
      | Green | Poison | 15 ft. cone (Con. save) |
      | Red | Fire | 15 ft. cone (Dex. save) |
      | Silver | Cold | 15 ft. cone (Con. save) |
      | White | Cold | 15 ft. cone (Con. save) |

      Draconic Ancestry. You have draconic ancestry. Choose one type of dragon from the Draconic Ancestry table. Your breath weapon and damage resistance are determined by the dragon type, as shown in the table.

      Breath Weapon. You can use your action to exhale destructive energy. Your draconic ancestry determines the size, shape, and damage type of the exhalation.

      When you use your breath weapon, each creature in the area of the exhalation must make a saving throw, the type of which is determined by your draconic ancestry. The DC for this saving throw equals 8 + your Constitution modifier + your proficiency bonus. A creature takes 2d6 damage on a failed save, and half as much damage on a successful one. The damage increases to 3d6 at 6th level, 4d6 at 11th level, and 5d6 at 16th level.

      After you use your breath weapon, you can’t use it again until you complete a short or long rest.
    questions_and_answers:
      - question: What dragon types can use fire as their breath weapon?
        answer: Brass, Gold, and Red dragons can use fire as their breath weapon.
      - question: How often can you use your breath weapon?
        answer: You can use your breath weapon once per short or long rest.
      - question: What is the saving throw DC for a breath weapon?
        answer: The DC for the saving throw equals 8 + your Constitution modifier + your proficiency bonus.
  
  - context: |
      Bardic Inspiration

      You can inspire others through stirring words or music. To do so, you use a bonus action on your turn to choose one creature other than yourself within 60 feet of you who can hear you. That creature gains one Bardic Inspiration die, a d6.

      Once within the next 10 minutes, the creature can roll the die and add the number rolled to one ability check, attack roll, or saving throw it makes. The creature can wait until after it rolls the d20 before deciding to use the Bardic Inspiration die, but must decide before the GM says whether the roll succeeds or fails. Once the Bardic Inspiration die is rolled, it is lost. A creature can have only one Bardic Inspiration die at a time.

      You can use this feature a number of times equal to your Charisma modifier (a minimum of once). You regain any expended uses when you finish a long rest.

      Your Bardic Inspiration die changes when you reach certain levels in this class. The die becomes a d8 at 5th level, a d10 at 10th level, and a d12 at 15th level.

      Jack of All Trades

      Starting at 2nd level, you can add half your proficiency bonus, rounded down, to any ability check you make that doesn’t already include your proficiency bonus.
    questions_and_answers:
      - question: How many times can you use Bardic Inspiration?
        answer: You can use Bardic Inspiration a number of times equal to your Charisma modifier (a minimum of once).
      - question: When does your Bardic Inspiration die increase in size?
        answer: Your Bardic Inspiration die increases in size at certain levels, it becomes a d8 at 5th level, a d10 at 10th level, and a d12 at 15th level.
      - question: What is Jack of All Trades?
        answer: Starting at 2nd level, Jack of All Trades allows you to add half your proficiency bonus, rounded down, to any ability check you make that doesn’t already include your proficiency bonus.

  - context: |
      Wild Shape

      Starting at 2nd level, you can use your action to magically assume the shape of a beast that you have seen before. You can use this feature twice. You regain expended uses when you finish a short or long rest.

      Your druid level determines the beasts you can transform into, as shown in the Beast Shapes table. At 2nd level, for example, you can transform into any beast that has a challenge rating of 1/4 or lower that doesn’t have a flying or swimming speed.

      Beast Shapes*

      | Level | Max. CR | Limitations | Example |
      | :---: | :----: | ----------- | ------- |
      | 2nd | 1/4 | No flying or swimming | Wolf |
      | 4th | 1/2 | No flying speed | Crocodile |
      | 8th | 1 | - | Giant Eagle |

      You can stay in a beast shape for a number of hours equal to half your druid level (rounded down). You then revert to your normal form unless you expend another use of this feature. You can revert to your normal form earlier by using a bonus action on your turn. You automatically revert if you fall unconscious, drop to 0 hit points, or die.

      While you are transformed, the following rules apply:

      Your game statistics are replaced by the statistics of the beast, but you retain your alignment, personality, and Intelligence, Wisdom, and Charisma scores. You also retain all of your skill and saving throw proficiencies, in addition to gaining those of the creature. If the creature has the same proficiency as you and the bonus in its stat block is higher than yours, use the creature’s bonus instead of yours. If the creature has any legendary or lair actions, you can’t use them.

      When you transform, you assume the beast’s hit points and Hit Dice. When you revert to your normal form, you return to the number of hit points you had before you transformed. However, if you revert as a result of dropping to 0 hit points, any excess damage carries over to your normal form. For example, if you take 10 damage in animal form and have only 1 hit point left, you revert and take 9 damage. As long as the excess damage doesn’t reduce your normal form to 0 hit points, you aren’t knocked unconscious.

      You can’t cast spells, and your ability to speak or take any action that requires hands is limited to the capabilities of your beast form. Transforming doesn’t break your concentration on a spell you’ve already cast, however, or prevent you from taking actions that are part of a spell, such as _call lightning_ , that you’ve already cast.

      You retain the benefit of any features from your class, race, or other source and can use them if the new form is physically capable of doing so. However, you can’t use any of your special senses, such as darkvision, unless your new form also has that sense.

      You choose whether your equipment falls to the ground in your space, merges into your new form, or is worn by it. Worn equipment functions as normal, but the GM decides whether it is practical for the new form to wear a piece of equipment, based on the creature’s shape and size. Your equipment doesn’t change size or shape to match the new form, and any equipment that the new form can’t wear must either fall to the ground or merge with it. Equipment that merges with the form has no effect until you leave the form.
    questions_and_answers:
      - question: How long can you stay in a beast shape?
        answer: You can stay in a beast shape for a number of hours equal to half your druid level (rounded down).
      - question: What happens to your hit points when you transform and revert?
        answer: When you transform, you assume the beast’s hit points and Hit Dice. When you revert to your normal form, you return to the number of hit points you had before you transformed. However, if you revert as a result of dropping to 0 hit points, any excess damage carries over to your normal form.
      - question: Can you cast spells while in beast form?
        answer: You can’t cast spells while in beast form, and your ability to speak or take any action that requires hands is limited to the capabilities of your beast form. However, transforming doesn’t break your concentration on a spell you’ve already cast, nor does it prevent you from taking actions that are part of a spell you’ve already cast.

